name: Deploy Astro Blog to Hetzner

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
            
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Astro Website
        run: npm run build
          
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }} 
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Adding Known Hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          HOST=$(echo "$SSH_HOST" | xargs)
          ssh-keyscan -p 222 -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_TARGET: ${{ secrets.REMOTE_TARGET }}
        run: |
          HOST=$(echo "$SSH_HOST" | xargs)
          USER=$(echo "$SSH_USER" | xargs)
          TARGET=$(echo "$REMOTE_TARGET" | xargs)

          echo "Deploying to $USER@$HOST:$TARGET on port 222"
          rsync -avz --delete -e "ssh -p 222" dist/ "$USER@$HOST:$TARGET"
