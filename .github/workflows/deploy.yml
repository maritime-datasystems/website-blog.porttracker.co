name: Deploy Astro Blog to Hetzner

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
            
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Astro Website
        run: npm run build
          
      - name: Sync files via FTP to Hetzner
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ 
          server-dir: /public_html/blog_porttracker/
          dry-run: false
          security: loose
          timeout: 600000
